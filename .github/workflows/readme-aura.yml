name: Generate Profile
on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate profile SVG
        env:
          GITHUB_TOKEN: ${{ secrets.METRICTOKEN }}
          GITHUB_USER: acedmicabhishek
        run: node .github/scripts/generate-profile.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/profile.svg
          git diff --staged --quiet || git commit -m "chore: update profile SVG" && git push
