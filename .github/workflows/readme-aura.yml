name: Generate README
on:
  push:
    branches: [main, master]
    paths: ['readme.source.md']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch real contribution calendar
        env:
          GITHUB_TOKEN: ${{ secrets.METRICTOKEN }}
          GITHUB_USER: acedmicabhishek
        run: node .github/scripts/fetch-contributions.js

      - name: Generate README
        uses: collectioneur/readme-aura@main
        with:
          github_token: ${{ secrets.METRICTOKEN }}
